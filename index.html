<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel de Controle de Projetos Técnicos</title>

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/tema.css">
</head>

<body>

    <header>

        <h1>Painel de Projetos Técnicos</h1>

        <div class="botoes">

            <button id="temaBtn">
                🌙 Tema
            </button>

            <button id="statusBtn">
                🔄 Atualizar Status
            </button>

            <button id="corBtn">
                🎨 Alterar Cor
            </button>

        </div>

    </header>

    <main>

        <div id="projetos">

            <div class="card">
                <h2>Reforço Estrutural</h2>
                <p>Status: <span class="status">Pendente</span></p>
            </div>

            <div class="card">
                <h2>Não Conformidade GMG</h2>
                <p>Status: <span class="status">Em Andamento</span></p>
            </div>

            <div class="card">
                <h2>Resiliência</h2>
                <p>Status: <span class="status">Concluído</span></p>
            </div>

        </div>

    </main>

    <script src="js/tema.js"></script>
    <script src="js/projetos.js"></script>

</body>

</html>
