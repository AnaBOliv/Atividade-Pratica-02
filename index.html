<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel de Controle de Projetos Técnicos</title>

    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/tema.css">
</head>

<body>

    <header>

        <h1>Painel de Projetos Técnicos</h1>

        <div class="botoes">

            <button id="temaBtn">
                🌙 Tema
            </button>

            <button id="statusBtn">
                🔄 Atualizar Status
            </button>

            <button id="corBtn">
                🎨 Alterar Cor
            </button>

        </div>

    </header>

<main>

    <section class="meta-container">

        <h2>Meta de Projetos</h2>

        <input
            type="number"
            id="metaInput"
            min="1"
            placeholder="Digite sua meta"
        >

        <button id="salvarMeta">
            Salvar Meta
        </button>

        <p id="resultadoMeta">
            Defina uma meta.
        </p>

    </section>

    <section class="novo-projeto">

        <h2>Adicionar Projeto</h2>

        <input
            type="text"
            id="novoProjeto"
            placeholder="Nome do projeto"
        >

        <button id="adicionarProjeto">
            Adicionar
        </button>

    </section>

    <div id="projetos"></div>

</main>

    <script src="js/tema.js"></script>
    <script src="js/projetos.js"></script>

</body>

</html>
